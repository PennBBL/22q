<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111720;
    --border: #1e2a38;
    --accent: #00d4aa;
    --accent2: #4f9eff;
    --warn: #f5a623;
    --muted: #4a6070;
    --text: #c8d8e8;
    --heading: #e8f2ff;
    --mono: 'DM Mono', monospace;
    --serif: 'Fraunces', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    background: linear-gradient(180deg, #0d1520 0%, transparent 100%);
    animation: fadeDown 0.6s ease both;
  }

  .site-title {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 600;
    color: var(--heading);
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .site-subtitle {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 14px;
    color: var(--muted);
    margin-top: 4px;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 11px;
    color: var(--muted);
  }

  .meta-row .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Layout */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 36px 40px;
    display: grid;
    gap: 28px;
  }

  /* Section labels */
  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Stats row */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .stat-card {
    background: var(--surface);
    padding: 22px 24px;
    transition: background 0.2s;
  }

  .stat-card:hover { background: #151f2e; }

  .stat-value {
    font-family: var(--serif);
    font-size: 38px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* Two column layout */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
  }

  @media (max-width: 768px) {
    .two-col { grid-template-columns: 1fr; }
    header, main { padding: 20px; }
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    animation: fadeUp 0.6s ease both;
  }

  /* Experiments */
  .experiments-list { display: flex; flex-direction: column; gap: 16px; }

  .exp-card {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 16px 18px;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
  }

  .exp-card:hover {
    border-color: var(--accent);
    transform: translateX(3px);
  }

  .exp-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }

  .exp-id {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .exp-title {
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 600;
    color: var(--heading);
    line-height: 1.3;
    margin-top: 2px;
  }

  .status-badge {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .status-ongoing  { background: rgba(0,212,170,0.1); color: var(--accent); border: 1px solid rgba(0,212,170,0.25); }
  .status-completed { background: rgba(79,158,255,0.1); color: var(--accent2); border: 1px solid rgba(79,158,255,0.25); }
  .status-planned  { background: rgba(245,166,35,0.1); color: var(--warn); border: 1px solid rgba(245,166,35,0.25); }

  .exp-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
  }

  .progress-pct { font-size: 11px; color: var(--muted); width: 32px; text-align: right; }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .tag {
    font-size: 10px;
    padding: 2px 7px;
    background: var(--border);
    color: var(--muted);
    border-radius: 2px;
    letter-spacing: 0.3px;
  }

  /* Chart */
  .chart-wrap {
    position: relative;
    height: 160px;
    display: flex;
    align-items: flex-end;
    gap: 6px;
    padding-bottom: 22px;
  }

  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }

  .bar {
    width: 100%;
    background: linear-gradient(180deg, var(--accent) 0%, rgba(0,212,170,0.3) 100%);
    border-radius: 2px 2px 0 0;
    transition: height 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    cursor: default;
  }

  .bar::after {
    content: attr(data-val);
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .bar:hover::after { opacity: 1; }
  .bar:hover { background: linear-gradient(180deg, #00ffcc 0%, rgba(0,212,170,0.5) 100%); }

  .bar-label {
    font-size: 10px;
    color: var(--muted);
    position: absolute;
    bottom: 0;
  }

  /* Publications */
  .pub-list { display: flex; flex-direction: column; gap: 14px; }

  .pub-item {
    border-left: 2px solid var(--border);
    padding-left: 14px;
    transition: border-color 0.2s;
  }

  .pub-item:hover { border-color: var(--accent2); }

  .pub-title {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 600;
    color: var(--heading);
    line-height: 1.4;
    margin-bottom: 3px;
  }

  .pub-authors {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .pub-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    flex-wrap: wrap;
  }

  .pub-journal { color: var(--accent2); }

  .pub-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .pub-published { background: rgba(79,158,255,0.1); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .pub-preprint  { background: rgba(245,166,35,0.1);  color: var(--warn);   border: 1px solid rgba(245,166,35,0.2); }

  .pub-doi {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .pub-doi:hover { color: var(--accent); }

  /* Footer */
  footer {
    text-align: center;
    padding: 24px 40px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.15s; }
  .card:nth-child(3) { animation-delay: 0.10s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
</style>
</head>
<body>

<header>
  <div>
    <div class="site-title" id="siteTitle">—</div>
    <div class="site-subtitle" id="siteSubtitle">—</div>
  </div>
  <div class="meta-row">
    <span class="dot"></span>
    <span id="institution">—</span>
    <span>·</span>
    <span>Updated <span id="updated">—</span></span>
  </div>
</header>

<main>

  <!-- Stats -->
  <div>
    <div class="section-label">Overview</div>
    <div class="stats-grid" id="statsGrid"></div>
  </div>

  <!-- Experiments + Chart -->
  <div class="two-col">
    <div class="card" style="animation-delay:0.05s">
      <div class="section-label">Experiments</div>
      <div class="experiments-list" id="expList"></div>
    </div>

    <div style="display:flex; flex-direction:column; gap:28px;">
      <div class="card" style="animation-delay:0.12s">
        <div class="section-label" id="chartLabel">Activity</div>
        <div class="chart-wrap" id="chartWrap"></div>
      </div>

      <div class="card" style="animation-delay:0.18s">
        <div class="section-label">Publications</div>
        <div class="pub-list" id="pubList"></div>
      </div>
    </div>
  </div>

</main>

<footer id="footer">—</footer>

<script>
async function load() {
  const res = await fetch('data.json');
  const d = await res.json();

  // Header
  document.title = d.site.title;
  document.getElementById('siteTitle').textContent = d.site.title;
  document.getElementById('siteSubtitle').textContent = d.site.subtitle;
  document.getElementById('institution').textContent = d.site.institution;
  document.getElementById('updated').textContent = d.site.updated;
  document.getElementById('footer').textContent =
    `${d.site.title} · ${d.site.institution} · Last updated ${d.site.updated}`;

  // Stats
  const sg = document.getElementById('statsGrid');
  d.stats.forEach(s => {
    sg.innerHTML += `<div class="stat-card">
      <div class="stat-value">${s.value}</div>
      <div class="stat-label">${s.label}</div>
    </div>`;
  });

  // Experiments
  const statusColors = {
    ongoing: 'var(--accent)',
    completed: 'var(--accent2)',
    planned: 'var(--warn)'
  };

  const el = document.getElementById('expList');
  d.experiments.forEach(e => {
    const color = statusColors[e.status] || 'var(--muted)';
    const period = e.end ? `${e.start} – ${e.end}` : `${e.start} – present`;
    el.innerHTML += `
      <div class="exp-card">
        <div class="exp-header">
          <div>
            <div class="exp-id">${e.id} · ${period}</div>
            <div class="exp-title">${e.title}</div>
          </div>
          <span class="status-badge status-${e.status}">${e.status}</span>
        </div>
        <div class="exp-desc">${e.description}</div>
        <div class="progress-row">
          <div class="progress-bar">
            <div class="progress-fill" style="width:0%; background:${color}" data-target="${e.progress}"></div>
          </div>
          <span class="progress-pct">${e.progress}%</span>
        </div>
        <div class="tags">${e.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>`;
  });

  // Animate progress bars after paint
  requestAnimationFrame(() => {
    document.querySelectorAll('.progress-fill').forEach(b => {
      b.style.width = b.dataset.target + '%';
    });
  });

  // Chart
  const ch = d.chart;
  document.getElementById('chartLabel').textContent = ch.label;
  const wrap = document.getElementById('chartWrap');
  const max = Math.max(...ch.values);

  ch.months.forEach((m, i) => {
    const pct = Math.round((ch.values[i] / max) * 100);
    const col = document.createElement('div');
    col.className = 'bar-col';
    col.innerHTML = `
      <div class="bar" data-val="${ch.values[i]}" style="height:0%" ></div>
      <span class="bar-label">${m}</span>`;
    wrap.appendChild(col);
    // animate in
    setTimeout(() => {
      col.querySelector('.bar').style.height = pct + '%';
    }, 200 + i * 60);
  });

  // Publications
  const pl = document.getElementById('pubList');
  d.publications.forEach(p => {
    const doi = p.doi
      ? `<a class="pub-doi" href="https://doi.org/${p.doi}" target="_blank">DOI ↗</a>`
      : '';
    pl.innerHTML += `
      <div class="pub-item">
        <div class="pub-title">${p.title}</div>
        <div class="pub-authors">${p.authors}</div>
        <div class="pub-meta">
          <span class="pub-journal">${p.journal}</span>
          <span class="pub-badge pub-${p.status}">${p.status}</span>
          <span>${p.year}</span>
          ${doi}
        </div>
      </div>`;
  });
}

load().catch(err => {
  document.querySelector('main').innerHTML =
    `<div style="color:var(--warn);font-family:var(--mono);padding:40px">
      ⚠ Could not load data.json — ${err.message}
    </div>`;
});
</script>
</body>
</html>
